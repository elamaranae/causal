services:
  causal-identity-app:
    image: identity:latest
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://causal-identity-db:5432/userdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_PRIVATE_KEY_PATH=/keys/private.pem
      - JWT_PUBLIC_KEY_PATH=/keys/public.pem
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://o11y-otel-collector:4318
    volumes:
      - ../keys:/keys:ro
    depends_on:
      causal-identity-db:
        condition: service_healthy
    networks:
      causal-net:
        ipv4_address: 172.20.0.10
  causal-identity-db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=userdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - causal-identity-db-data:/var/lib/postgresql
    networks:
      causal-net:
        ipv4_address: 172.20.0.11

networks:
  causal-net:
    external: true
    name: causal_causal-net

volumes:
  causal-identity-db-data:
