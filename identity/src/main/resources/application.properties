spring.application.name=identity

# Database Configuration
spring.datasource.url=jdbc:postgresql://causal-identity-db:5432/userdb
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
# Flyway Configuration
spring.flyway.enabled=true
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.web=DEBUG

# JPA / Hibernate properties
# We use 'validate' so Hibernate checks if the schema matches the entities but doesn't modify it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# OpenTelemetry (all signals push to Collector via OTLP)
management.otlp.metrics.export.url=http://o11y-otel-collector:4318/v1/metrics
management.otlp.metrics.export.step=5s
management.opentelemetry.tracing.export.otlp.endpoint=http://o11y-otel-collector:4318/v1/traces
management.opentelemetry.tracing.export.otlp.timeout=5s
management.opentelemetry.logging.export.otlp.endpoint=http://o11y-otel-collector:4318/v1/logs
management.opentelemetry.logging.export.otlp.timeout=5s
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
management.tracing.sampling.probability=1.0

# JWT Configuration
jwt.private-key-path=${JWT_PRIVATE_KEY_PATH:../keys/private.pem}
jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:../keys/public.pem}
# 5 minutes in milliseconds
jwt.expiration=300000
# 7 days in milliseconds
jwt.refreshExpiration=604800000
