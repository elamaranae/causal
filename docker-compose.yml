include:
  - identity/docker-compose.yml
  - product/docker-compose.yml
  - cart/docker-compose.yml
  - inventory/docker-compose.yml
  - profile/docker-compose.yml
  - order/docker-compose.yml

services:
  causal-kafka:
    image: apache/kafka:latest
    restart: always
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://causal-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@causal-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: causal-kafka-cluster-id-01
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
    volumes:
      - causal-kafka-data:/tmp/kraft-combined-logs
    networks:
      causal-net:
        ipv4_address: 172.20.0.3

  causal-gateway:
    image: caddy:latest
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://o11y-otel-collector:4318
      - OTEL_SERVICE_NAME=causal-gateway
    networks:
      causal-net:
        ipv4_address: 172.20.0.2

volumes:
  causal-kafka-data:

networks:
  causal-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
