include:
  - identity/docker-compose.yml
  - product/docker-compose.yml

services:
  gateway:
    image: caddy:latest
    ports:
      - "8090:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4318
      - OTEL_SERVICE_NAME=gateway
