spring.application.name=cart

# -- services --

spring.http.serviceclient.inventory.base-url=http://causal-inventory-app:8080
spring.http.serviceclient.inventory.connect-timeout=2s
spring.http.serviceclient.inventory.read-timeout=5s

services.inventory.api-key=${INTERNAL_API_KEY}

# -- security

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://causal-identity-app:8080/.well-known/jwks.json

# -- persistence --

spring.datasource.url=jdbc:postgresql://causal-cart-db:5432/cartdb
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view: false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# -- pagination --

spring.data.web.pageable.one-indexed-parameters: true
spring.data.web.pageable.max-page-size: 100

# -- kafka --

spring.kafka.bootstrap-servers=causal-kafka:9092
spring.kafka.consumer.group-id=cart
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# -- observability --

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

logging.level.org.springframework.web=DEBUG
management.otlp.metrics.export.url=http://o11y-otel-collector:4318/v1/metrics
management.otlp.metrics.export.step=5s

management.opentelemetry.tracing.export.otlp.endpoint=http://o11y-otel-collector:4318/v1/traces
management.opentelemetry.tracing.export.otlp.timeout=5s
management.tracing.sampling.probability=1.0

management.opentelemetry.logging.export.otlp.endpoint=http://o11y-otel-collector:4318/v1/logs
management.opentelemetry.logging.export.otlp.timeout=5s
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
