spring.application.name=cart

# -- services --

services.inventory.base-url=${INVENTORY_URL:http://inventory-app:8080}
services.inventory.api-key=${INTERNAL_API_KEY:REDACTED_API_KEY}
services.inventory.connect-timeout=2s
services.inventory.read-timeout=5s

# -- security

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${IDENTITY_URL:http://identity-app:8080/.well-known/jwks.json}

# -- persistence --

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/cartdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view: false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# -- pagination --

spring.data.web.pageable.one-indexed-parameters: true
spring.data.web.pageable.max-page-size: 100

# -- observability --

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

logging.level.org.springframework.web=DEBUG
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
management.otlp.metrics.export.step=5s

management.opentelemetry.tracing.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
management.opentelemetry.tracing.export.otlp.timeout=5s
management.tracing.sampling.probability=1.0

management.opentelemetry.logging.export.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs
management.opentelemetry.logging.export.otlp.timeout=5s
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
