services:
  causal-order-app:
    image: order:latest
    env_file:
      - ../.env
    depends_on:
      causal-order-db:
        condition: service_healthy
      causal-kafka:
        condition: service_healthy
    networks:
      causal-net:
        ipv4_address: 172.20.0.50
  causal-order-db:
    image: postgres:latest
    restart: always
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      - POSTGRES_DB=orderdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - causal-order-db-data:/var/lib/postgresql
    networks:
      causal-net:
        ipv4_address: 172.20.0.51
  causal-order-rabbitmq:
    image: rabbitmq:4-management
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - causal-order-rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      causal-net:
        ipv4_address: 172.20.0.52
  causal-order-debezium:
    image: quay.io/debezium/server:latest
    restart: always
    env_file:
      - ../.env
    depends_on:
      causal-order-db:
        condition: service_healthy
      causal-order-rabbitmq:
        condition: service_healthy
    volumes:
      - ./debezium/application.properties:/debezium/config/application.properties
      - causal-order-debezium-data:/debezium/data
    networks:
      causal-net:
        ipv4_address: 172.20.0.53

volumes:
  causal-order-db-data:
  causal-order-rabbitmq-data:
  causal-order-debezium-data:
