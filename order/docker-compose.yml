services:
  causal-order-app:
    image: order:latest
    depends_on:
      causal-order-db:
        condition: service_healthy
    networks:
      causal-net:
        ipv4_address: 172.20.0.50
  causal-order-db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=orderdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - causal-order-db-data:/var/lib/postgresql
    networks:
      causal-net:
        ipv4_address: 172.20.0.51

networks:
  causal-net:
    external: true
    name: causal_causal-net

volumes:
  causal-order-db-data:
