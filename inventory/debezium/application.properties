# Sink - RabbitMQ (AMQP)
debezium.sink.type=rabbitmq
debezium.sink.rabbitmq.connection.host=causal-inventory-rabbitmq
debezium.sink.rabbitmq.connection.port=5672
debezium.sink.rabbitmq.connection.username=${RABBITMQ_USERNAME}
debezium.sink.rabbitmq.connection.password=${RABBITMQ_PASSWORD}
debezium.sink.rabbitmq.ackTimeout=30000
debezium.sink.rabbitmq.exchange=outbox
debezium.sink.rabbitmq.routingKey.source=topic
debezium.sink.rabbitmq.deliveryMode=2
debezium.sink.rabbitmq.null.value=null

# Source - PostgreSQL
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=causal-inventory-db
debezium.source.database.port=5432
debezium.source.database.user=postgres
debezium.source.database.password=${DB_PASSWORD}
debezium.source.database.dbname=inventorydb
debezium.source.topic.prefix=inventory
debezium.source.table.include.list=public.outbox
debezium.source.plugin.name=pgoutput

# Offset storage - file-based for persistence across restarts
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=0

# Outbox Event Router - routes outbox table changes as domain events
debezium.transforms=outbox
debezium.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter
debezium.transforms.outbox.table.expand.json.payload=true
debezium.transforms.outbox.table.field.event.timestamp=created_at
debezium.transforms.outbox.route.topic.replacement=$${routedByValue}

# Logging
quarkus.log.console.json=false
