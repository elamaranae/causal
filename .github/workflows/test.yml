name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [identity, profile, order, inventory]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: ./gradlew test

  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Build service images
        run: |
          for service in identity product cart profile inventory order; do
            cd $service
            ./gradlew jibDockerBuild -Djib.from.platforms=linux/amd64
            cd ..
          done

      - name: Pull Docker images
        run: docker compose pull --ignore-buildable --ignore-pull-failures

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://172.20.0.2
        run: npm ci && npm run build

      - name: Generate JWT keys
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem

      - name: Create .env
        run: |
          cat > .env <<'EOF'
          DB_PASSWORD=password
          RABBITMQ_USERNAME=guest
          RABBITMQ_PASSWORD=guest
          INTERNAL_API_KEY=ci-internal-key
          PAYMENT_ENCRYPTION_KEY=dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItZGV2LTEyMzQ=
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 120

      - name: Seed databases
        run: |
          pip install pyyaml
          ./seed.sh

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: e2e
        env:
          BASE_URL: http://172.20.0.2
        run: npm test

      - name: Service logs
        if: failure()
        run: docker compose logs --tail 50

      - name: Stop services
        if: always()
        run: docker compose down
