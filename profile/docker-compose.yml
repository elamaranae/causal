services:
  causal-profile-app:
    image: profile:latest
    depends_on:
      causal-profile-db:
        condition: service_healthy
    networks:
      causal-net:
        ipv4_address: 172.20.0.60
  causal-profile-db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=profiledb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - causal-profile-db-data:/var/lib/postgresql
    networks:
      causal-net:
        ipv4_address: 172.20.0.61

networks:
  causal-net:
    external: true
    name: causal_causal-net

volumes:
  causal-profile-db-data:
