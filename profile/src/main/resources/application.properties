spring.application.name=profile

# -- services --

services.internal-api-key=REDACTED_API_KEY

# -- security

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://causal-identity-app:8080/.well-known/jwks.json

# -- persistence --

spring.datasource.url=jdbc:postgresql://causal-profile-db:5432/profiledb
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view: false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# -- pagination --

spring.data.web.pageable.one-indexed-parameters: true
spring.data.web.pageable.max-page-size: 100

# -- observability --

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

logging.level.org.springframework.web=DEBUG
management.otlp.metrics.export.url=http://o11y-otel-collector:4318/v1/metrics
management.otlp.metrics.export.step=5s

management.opentelemetry.tracing.export.otlp.endpoint=http://o11y-otel-collector:4318/v1/traces
management.opentelemetry.tracing.export.otlp.timeout=5s
management.tracing.sampling.probability=1.0

management.opentelemetry.logging.export.otlp.endpoint=http://o11y-otel-collector:4318/v1/logs
management.opentelemetry.logging.export.otlp.timeout=5s
management.opentelemetry.resource-attributes.service.name=${spring.application.name}
