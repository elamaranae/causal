spring.application.name=product

# Security
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${IDENTITY_URL:http://identity-app:8080/.well-known/jwks.json}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# OpenTelemetry (all signals push to Collector via OTLP)
management.otlp.export.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
management.opentelemetry.resource-attributes.service.name=${spring.application.name}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/productdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

# JPA / Hibernate properties
# We use 'validate' so Hibernate checks if the schema matches the entities but doesn't modify it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
