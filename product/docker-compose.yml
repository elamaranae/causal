services:
  product-app:
    image: product:latest
  product-db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=productdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - product-db-data:/var/lib/postgresql

volumes:
  product-db-data:
