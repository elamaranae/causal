services:
  product-app:
    image: product-service:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.product-service.rule=PathPrefix(`/products`)"
      - "traefik.http.routers.product-service.entrypoints=web"
      - "traefik.http.routers.product-service.middlewares=cors"
      - "traefik.http.services.product-service.loadbalancer.server.port=8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://product-db:5432/productdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      product-db:
        condition: service_healthy
  product-db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=productdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - product-db-data:/var/lib/postgresql

volumes:
  product-db-data: