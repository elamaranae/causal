services:
  causal-product-app:
    image: product:latest
    env_file:
      - ../.env
    depends_on:
      causal-product-db:
        condition: service_healthy
      causal-product-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      causal-net:
        ipv4_address: 172.20.0.20
  causal-product-db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=productdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - causal-product-db-data:/var/lib/postgresql
    networks:
      causal-net:
        ipv4_address: 172.20.0.21

  causal-product-redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      causal-net:
        ipv4_address: 172.20.0.22

volumes:
  causal-product-db-data:
