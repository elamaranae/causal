services:
  causal-product-app:
    image: product:latest
    depends_on:
      causal-product-db:
        condition: service_healthy
    networks:
      causal-net:
        ipv4_address: 172.20.0.20
  causal-product-db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_DB=productdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - causal-product-db-data:/var/lib/postgresql
    networks:
      causal-net:
        ipv4_address: 172.20.0.21

networks:
  causal-net:
    external: true
    name: causal_causal-net

volumes:
  causal-product-db-data:
