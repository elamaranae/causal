spring.application.name=demo

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/userdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

# JPA / Hibernate properties
# We use 'validate' so Hibernate checks if the schema matches the entities but doesn't modify it.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# 15 minutes in milliseconds
jwt.secret=REDACTED_JWT_SECRET
jwt.expiration=300000
# 7 days in milliseconds
jwt.refreshExpiration=604800000